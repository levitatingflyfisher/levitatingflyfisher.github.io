<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/porch/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Porch — the porch light for your friend group. Presence, not chat. A privacy-first, end-to-end-encrypted way to say 'I'm around'. This web build is a preview: keys live in browser storage, weaker than the Android app.">
  <meta name="theme-color" content="#B4762A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Porch">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Porch</title>
  <link rel="manifest" href="manifest.json">
  <script>/* keep local data across sessions (resist eviction on installed PWAs) */if(navigator.storage&&navigator.storage.persist){try{navigator.storage.persist();}catch(e){}}</script>
  <style>
#oh-boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#F5EFE6;z-index:99999;transition:opacity .35s ease}
#oh-boot .s{width:42px;height:42px;border:3px solid #EBE1D2;border-top-color:#B4762A;border-radius:50%;animation:ohspin .8s linear infinite}
@keyframes ohspin{to{transform:rotate(360deg)}}
@media(prefers-color-scheme:dark){#oh-boot{background:#1C1408}#oh-boot .s{border-color:#35291A;border-top-color:#C9923C}}
</style>
  <script>
(function(){
  // Self-heal stale PWA caches: when a new service worker takes over after a
  // redeploy, reload once so a returning visitor never sees a blank stale shell.
  if('serviceWorker' in navigator){var done=false;
    navigator.serviceWorker.addEventListener('controllerchange',function(){if(done)return;done=true;location.reload();});
    navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.update();});}).catch(function(){});}
  // Remove the boot spinner once Flutter has painted (or after a hard timeout).
  var iv=setInterval(function(){
    if(document.querySelector('flt-glass-pane,flutter-view,flt-scene-host')){
      clearInterval(iv);var b=document.getElementById('oh-boot');
      if(b){b.style.opacity='0';setTimeout(function(){if(b.parentNode)b.parentNode.removeChild(b);},400);}
    }},150);
  setTimeout(function(){var b=document.getElementById('oh-boot');if(b&&b.parentNode)b.parentNode.removeChild(b);},25000);
})();
</script>
  <!-- sodium sumo (libsodium.js) — injected by `dart run sodium_libs:update_web
       --sumo`; required for SodiumSumoInit.init() at runtime. Keep on redeploy. -->
  <script type="text/javascript" src="sodium.js" async="true"></script>
</head>
<body>
<div id="oh-boot"><div class="s"></div></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
